name: Check Approval

on:
  schedule:
    # Every 15 minutes. The latency between tapping approve and the post going live.
    # Drop to '*/5' if you want snappier, but you'll hit the 2000 min/month free tier faster.
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: linkedin-bot-state
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Check for approvals
        run: npm run check-approval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}

      - name: Commit state
        run: |
          git config user.name "linkedin-bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/
          git diff --cached --quiet || git commit -m "chore: process approvals"
          git push
