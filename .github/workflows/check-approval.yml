name: Check Approval

on:
  schedule:
    # Toutes les 15 min, lundi à vendredi, entre 7h et 20h UTC
    # = 8h-21h Paris en hiver, 9h-22h Paris en été
    # Le weekend, rien : pas de draft pending donc rien à check.
    # Hors plage, idem : tu valides en journée, pas à 3h du matin.
    - cron: "*/15 7-19 * * 1-5"
  workflow_dispatch:

concurrency:
  group: linkedin-bot-state
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Check for approvals
        run: npm run check-approval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}

      - name: Commit state
        run: |
          git config user.name "linkedin-bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/
          git diff --cached --quiet || git commit -m "chore: process approvals"
          git push
